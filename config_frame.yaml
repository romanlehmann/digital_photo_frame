# Pi-side configuration for digital photo frame
# Each frame gets its own copy with orientation set

setup_complete: false

frame:
  # Friendly name for this frame
  name: "living-room"
  # Which folder to sync: "horizontal" (1920x1200) or "vertical" (1200x1920)
  orientation: "horizontal"

# Synology Photos API — use Tailscale IP directly in share URLs
# e.g. https://100.101.43.67:5443/mo/sharing/YOUR_SHARE_ID
synology:
  share_urls:
    - "https://photos.example.com/mo/sharing/REPLACE_ME"
  share_passphrases:
    - ""

# Google Photos (public shared albums, no auth required)
google_photos:
  share_urls: []

# Photo storage and processing
photos:
  base_dir: "/srv/frame/photos"
  state_db: "/srv/frame/photos/state.db"
  tmp_dir: "/tmp/frame_downloads"
  horizontal:
    width: 1920
    height: 1200
  vertical:
    width: 1200
    height: 1920
  quality: 85
  blur_radius: 40
  blur_darken: 0.6

# Slideshow settings
slideshow:
  interval: 10
  transition: "fade"
  fade_duration: 1.0
  hot_corner_size: 50
  hot_corner_position: "top-left"

# Energy save / sleep
energy_save:
  method: "ddcci"

# Logging
logging:
  level: "INFO"
  file: "/var/log/photo_frame.log"
