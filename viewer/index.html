<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Photo Frame</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none !important;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo {
            position: absolute;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .photo.active {
            opacity: 1;
            z-index: 1;
        }

        .photo.previous {
            opacity: 0;
            z-index: 0;
        }

        #hot-corner {
            position: fixed;
            top: 0;
            right: 0;
            width: 200px;
            height: 200px;
            z-index: 1000;
            clip-path: polygon(100% 0, 0 0, 100% 100%);
            background: transparent;
            transition: background 0.3s ease;
        }

        #hot-corner.holding {
            background: rgba(255, 255, 255, 0.25);
        }

        #hot-corner-progress {
            position: fixed;
            top: 0;
            right: 0;
            width: 200px;
            height: 200px;
            z-index: 1001;
            clip-path: polygon(100% 0, 0 0, 100% 100%);
            background: conic-gradient(from 0deg at 67% 33%, rgba(255,255,255,0.7) var(--progress, 0%), transparent 0%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        #hot-corner-progress.active {
            opacity: 1;
        }

        #sync-progress-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 0%;
            height: 5px;
            background: #6af;
            z-index: 2000;
            transition: width 0.5s ease, opacity 0.5s ease;
            opacity: 0;
            pointer-events: none;
        }

        #sync-progress-bar.active {
            opacity: 1;
        }

        #sync-progress-bar.done {
            background: #6d6;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-size: 24px;
            z-index: 999;
        }

        #error {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #f44;
            font-size: 18px;
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.8);
            border-radius: 8px;
            z-index: 999;
            display: none;
        }

        #sleep-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 1500;
            display: none;
        }

        #sleep-overlay.active {
            display: block;
        }

        #settings-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.92);
            z-index: 2000;
            color: #eee;
            font-family: 'Courier New', monospace;
            padding: 40px;
        }

        #settings-overlay.visible {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }

        .settings-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        #settings-overlay h1 {
            font-size: 28px;
            margin-bottom: 30px;
            color: #fff;
        }

        .info-grid {
            display: grid;
            grid-template-columns: auto auto;
            gap: 12px 24px;
            font-size: 20px;
            margin-bottom: 40px;
        }

        .info-label {
            color: #888;
            text-align: right;
        }

        .info-value {
            color: #fff;
            font-weight: bold;
        }

        .settings-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .settings-btn {
            padding: 16px 32px;
            font-size: 20px;
            border: 2px solid #555;
            border-radius: 8px;
            background: #222;
            color: #fff;
            min-width: 160px;
        }

        .settings-btn:active {
            background: #444;
        }

        .settings-btn.danger {
            border-color: #c33;
            color: #f66;
        }

        .settings-btn.danger:active {
            background: #411;
        }

        .settings-btn.close-btn {
            border-color: #36a;
            color: #6af;
        }

        .brightness-control {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 500px;
        }

        .brightness-control label {
            color: #888;
            font-size: 20px;
            white-space: nowrap;
        }

        .brightness-control input[type="range"] {
            flex: 1;
            height: 40px;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
        }

        .brightness-control input[type="range"]::-webkit-slider-track {
            height: 8px;
            background: #444;
            border-radius: 4px;
        }

        .brightness-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 36px;
            height: 36px;
            background: #fff;
            border-radius: 50%;
            margin-top: -14px;
        }

        .brightness-control .brightness-value {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            min-width: 50px;
            text-align: center;
        }

        .auto-btn {
            padding: 8px 16px;
            font-size: 16px;
            border: 2px solid #555;
            border-radius: 8px;
            background: #222;
            color: #888;
            white-space: nowrap;
        }

        .auto-btn.active {
            border-color: #4a4;
            color: #6d6;
            background: #1a2e1a;
        }

        .schedule-control {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
            font-size: 20px;
        }

        .schedule-control label {
            color: #888;
            white-space: nowrap;
        }

        .time-picker {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .time-digit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .time-digit .time-val {
            font-size: 24px;
            font-family: 'Courier New', monospace;
            color: #fff;
            background: #333;
            padding: 6px 10px;
            border-radius: 6px;
            border: 2px solid #555;
            min-width: 44px;
            text-align: center;
        }

        .time-digit .time-btn {
            width: 44px;
            height: 32px;
            border: 2px solid #555;
            border-radius: 6px;
            background: #333;
            color: #fff;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .time-digit .time-btn:active {
            background: #555;
        }

        .time-picker .time-colon {
            font-size: 24px;
            color: #888;
            padding: 0 2px;
            align-self: center;
        }

        .schedule-control span.sep {
            color: #666;
            font-size: 22px;
        }

        .save-msg {
            color: #4a4;
            font-size: 16px;
            margin-left: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .save-msg.show {
            opacity: 1;
        }

        .orientation-control {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .orientation-control label {
            color: #888;
        }

        .orient-btn {
            padding: 8px 20px;
            font-size: 18px;
            border: 2px solid #555;
            border-radius: 8px;
            background: #222;
            color: #888;
        }

        .orient-btn.active {
            border-color: #36a;
            color: #6af;
            background: #1a2a3a;
        }

        #qr-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            z-index: 3000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            color: #eee;
            font-family: 'Courier New', monospace;
        }

        #qr-overlay.visible {
            display: flex;
        }

        #qr-overlay canvas {
            border-radius: 12px;
        }

        #qr-url {
            font-size: 20px;
            color: #aaa;
            word-break: break-all;
            text-align: center;
            max-width: 80vw;
        }

        #qr-overlay .settings-btn {
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div id="loading"></div>
    <div id="error"></div>
    <div id="slideshow"></div>
    <div id="sleep-overlay"></div>

    <div id="settings-overlay">
        <!-- Main Page -->
        <div id="settings-main" class="settings-page">
            <h1>Settings</h1>
            <div class="brightness-control">
                <label>Brightness</label>
                <input type="range" id="brightness-slider" min="0" max="100" value="100"
                       oninput="setBrightness(this.value)">
                <span class="brightness-value" id="brightness-value">100%</span>
                <button class="auto-btn" id="auto-brightness-btn" onclick="toggleAutoBrightness()">Auto</button>
            </div>
            <div class="schedule-control">
                <label id="interval-label">Interval</label>
                <div class="time-picker">
                    <div class="time-digit">
                        <button class="time-btn" onclick="adjustInterval(10)">+</button>
                        <span class="time-val" id="interval-val">300</span>
                        <button class="time-btn" onclick="adjustInterval(-10)">-</button>
                    </div>
                </div>
                <span style="color:#888;font-size:16px">s</span>
            </div>
            <div class="schedule-control">
                <button class="auto-btn" id="schedule-btn" onclick="toggleSchedule()">Sleep</button>
                <div class="time-picker">
                    <div class="time-digit">
                        <button class="time-btn" onclick="adjustTime('off','h',1)">+</button>
                        <span class="time-val" id="off-h">22</span>
                        <button class="time-btn" onclick="adjustTime('off','h',-1)">-</button>
                    </div>
                    <span class="time-colon">:</span>
                    <div class="time-digit">
                        <button class="time-btn" onclick="adjustTime('off','m',5)">+</button>
                        <span class="time-val" id="off-m">00</span>
                        <button class="time-btn" onclick="adjustTime('off','m',-5)">-</button>
                    </div>
                </div>
                <span class="sep">-</span>
                <div class="time-picker">
                    <div class="time-digit">
                        <button class="time-btn" onclick="adjustTime('on','h',1)">+</button>
                        <span class="time-val" id="on-h">07</span>
                        <button class="time-btn" onclick="adjustTime('on','h',-1)">-</button>
                    </div>
                    <span class="time-colon">:</span>
                    <div class="time-digit">
                        <button class="time-btn" onclick="adjustTime('on','m',5)">+</button>
                        <span class="time-val" id="on-m">00</span>
                        <button class="time-btn" onclick="adjustTime('on','m',-5)">-</button>
                    </div>
                </div>
            </div>
            <div class="settings-buttons">
                <button class="settings-btn" id="sync-now-btn" onclick="triggerSyncFromViewer()">Sync Now</button>
                <button class="settings-btn" onclick="showSettingsPage('display')">Display</button>
                <button class="settings-btn" onclick="showSettingsPage('system')">System</button>
                <button class="settings-btn close-btn" onclick="closeSettings()">Close</button>
            </div>
        </div>

        <!-- Display Page -->
        <div id="settings-display" class="settings-page" style="display:none">
            <h1 id="display-title">Display</h1>
            <div class="orientation-control">
                <label>Orientation</label>
                <button class="orient-btn" id="orient-h" onclick="setOrientation('horizontal')">Horizontal</button>
                <button class="orient-btn" id="orient-v" onclick="setOrientation('vertical')">Vertical</button>
                <span class="save-msg" id="orient-saved">Saved</span>
            </div>
            <div class="orientation-control">
                <label id="lang-label">Language</label>
                <button class="orient-btn" id="lang-en" onclick="setLanguage('en')">🇬🇧</button>
                <button class="orient-btn" id="lang-de" onclick="setLanguage('de')">🇩🇪</button>
            </div>
            <div class="settings-buttons">
                <button class="settings-btn close-btn" onclick="showSettingsPage('main')">← Back</button>
            </div>
        </div>

        <!-- System Page -->
        <div id="settings-system" class="settings-page" style="display:none">
            <h1 id="system-title">System</h1>
            <div class="info-grid">
                <span class="info-label">Hostname:</span>
                <span class="info-value" id="info-hostname">--</span>
                <span class="info-label">IP:</span>
                <span class="info-value" id="info-ip">--</span>
                <span class="info-label">Tailscale:</span>
                <span class="info-value" id="info-tailscale">--</span>
                <span class="info-label">WiFi:</span>
                <span class="info-value" id="info-wifi">--</span>
                <span class="info-label">CPU Temp:</span>
                <span class="info-value" id="info-temp">--</span>
                <span class="info-label">Disk:</span>
                <span class="info-value" id="info-disk">--</span>
                <span class="info-label">Photos:</span>
                <span class="info-value" id="info-photos">--</span>
                <span class="info-label">Sync:</span>
                <span class="info-value" id="info-sync">--</span>
            </div>
            <div class="settings-buttons">
                <button class="settings-btn" onclick="openFolderSync()">FolderSync</button>
                <button class="settings-btn" onclick="doReboot()">Reboot</button>
                <button class="settings-btn danger" onclick="doShutdown()">Shutdown</button>
                <button class="settings-btn close-btn" onclick="showSettingsPage('main')">← Back</button>
            </div>
        </div>
    </div>
    <div id="qr-overlay">
        <h1>Scan to Configure</h1>
        <canvas id="qr-canvas"></canvas>
        <div id="qr-url"></div>
        <button class="settings-btn close-btn" onclick="closeFolderSync()">Close</button>
    </div>
    <div id="sync-progress-bar"></div>
    <div id="hot-corner"></div>
    <div id="hot-corner-progress"></div>

    <script>
        // --- i18n ---
        const translations = {
            en: {
                settings: 'Settings',
                hostname: 'Hostname:',
                ip: 'IP:',
                tailscale: 'Tailscale:',
                wifi: 'WiFi:',
                cpu_temp: 'CPU Temp:',
                disk: 'Disk:',
                photos: 'Photos:',
                sync: 'Sync:',
                language: 'Language',
                orientation: 'Orientation',
                horizontal: 'Horizontal',
                vertical: 'Vertical',
                brightness: 'Brightness',
                auto: 'Auto',
                sleep: 'Sleep',
                foldersync: 'FolderSync',
                close: 'Close',
                reboot: 'Reboot',
                shutdown: 'Shutdown',
                saved: 'Saved',
                scan_to_configure: 'Scan to Configure',
                loading: 'Loading photos...',
                waiting: 'Waiting for photos (sync may be running)...',
                wifi_setup_required: 'WiFi Setup Required',
                connect_to: 'Connect to:',
                password: 'Password:',
                open_setup: 'Then open the setup page on your phone',
                not_connected: 'Not connected',
                confirm_shutdown: 'Shutdown Raspberry Pi?',
                confirm_reboot: 'Reboot Raspberry Pi?',
                shutting_down: 'Shutting down...',
                rebooting: 'Rebooting...',
                sync_now: 'Sync Now',
                confirm_sync: 'Start photo sync? The frame may become unresponsive until syncing is finished.',
                interval: 'Interval',
                display: 'Display',
                system: 'System',
                back: '\u2190 Back',
            },
            de: {
                settings: 'Einstellungen',
                hostname: 'Hostname:',
                ip: 'IP:',
                tailscale: 'Tailscale:',
                wifi: 'WLAN:',
                cpu_temp: 'CPU Temp:',
                disk: 'Speicher:',
                photos: 'Fotos:',
                sync: 'Sync:',
                language: 'Sprache',
                orientation: 'Ausrichtung',
                horizontal: 'Horizontal',
                vertical: 'Vertikal',
                brightness: 'Helligkeit',
                auto: 'Auto',
                sleep: 'Schlaf',
                foldersync: 'FolderSync',
                close: 'Schlie\u00dfen',
                reboot: 'Neustart',
                shutdown: 'Ausschalten',
                saved: 'Gespeichert',
                scan_to_configure: 'Scannen zum Konfigurieren',
                loading: 'Lade Fotos...',
                waiting: 'Warte auf Fotos (Sync l\u00e4uft evtl.)...',
                wifi_setup_required: 'WLAN-Einrichtung erforderlich',
                connect_to: 'Verbinde mit:',
                password: 'Passwort:',
                open_setup: 'Dann die Einrichtungsseite auf dem Handy \u00f6ffnen',
                not_connected: 'Nicht verbunden',
                confirm_shutdown: 'Raspberry Pi ausschalten?',
                confirm_reboot: 'Raspberry Pi neustarten?',
                shutting_down: 'Wird ausgeschaltet...',
                rebooting: 'Neustart...',
                sync_now: 'Sync',
                confirm_sync: 'Foto-Sync starten? Der Rahmen reagiert m\u00f6glicherweise nicht, bis die Synchronisierung abgeschlossen ist.',
                interval: 'Intervall',
                display: 'Anzeige',
                system: 'System',
                back: '\u2190 Zur\u00fcck',
            }
        };
        let lang = localStorage.getItem('frame-language') || 'en';
        function t(key) { return (translations[lang] || translations.en)[key] || key; }

        function setLanguage(l) {
            lang = l;
            localStorage.setItem('frame-language', l);
            applyLanguage();
        }

        function applyLanguage() {
            // Main page
            document.querySelector('#settings-main > h1').textContent = t('settings');
            document.querySelector('.brightness-control > label').textContent = t('brightness');
            document.getElementById('auto-brightness-btn').textContent = t('auto');
            document.getElementById('interval-label').textContent = t('interval');
            document.getElementById('schedule-btn').textContent = t('sleep');
            // Main buttons
            var mainBtns = document.querySelectorAll('#settings-main .settings-buttons .settings-btn');
            mainBtns[0].textContent = t('sync_now');
            mainBtns[1].textContent = t('display');
            mainBtns[2].textContent = t('system');
            mainBtns[3].textContent = t('close');
            // Display page
            document.getElementById('display-title').textContent = t('display');
            document.querySelector('.orientation-control > label').textContent = t('orientation');
            document.getElementById('orient-h').textContent = t('horizontal');
            document.getElementById('orient-v').textContent = t('vertical');
            document.getElementById('orient-saved').textContent = t('saved');
            document.querySelector('#lang-label').textContent = t('language');
            var displayBtns = document.querySelectorAll('#settings-display .settings-buttons .settings-btn');
            displayBtns[0].textContent = t('back');
            // System page
            document.getElementById('system-title').textContent = t('system');
            var labels = document.querySelectorAll('#settings-system .info-label');
            var labelKeys = ['hostname','ip','tailscale','wifi','cpu_temp','disk','photos','sync'];
            labels.forEach(function(el, i) { if (labelKeys[i]) el.textContent = t(labelKeys[i]); });
            var sysBtns = document.querySelectorAll('#settings-system .settings-buttons .settings-btn');
            sysBtns[0].textContent = t('foldersync');
            sysBtns[1].textContent = t('reboot');
            sysBtns[2].textContent = t('shutdown');
            sysBtns[3].textContent = t('back');
            // Language buttons
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            document.getElementById('lang-de').classList.toggle('active', lang === 'de');
            // QR overlay
            document.querySelector('#qr-overlay > h1').textContent = t('scan_to_configure');
            document.querySelector('#qr-overlay .settings-btn').textContent = t('close');
        }

        // Configuration (loaded from server /config endpoint)
        let config = {
            interval: 300000,         // default 5 min (ms)
            fade_duration: 1.0,       // seconds
            hot_corner_size: 200,
        };

        let photos = [];
        let currentIndex = 0;
        let currentImage = null;
        let previousImage = null;
        let intervalId = null;
        let photoHistory = [];  // stack of previously shown indices

        // Setup hot corner - 3 second hold to open settings
        const hotCorner = document.getElementById('hot-corner');
        const hotCornerProgress = document.getElementById('hot-corner-progress');
        let holdTimer = null;
        let holdAnimFrame = null;
        let holdStartTime = null;
        const HOLD_DURATION = 3000;

        function startHold(e) {
            e.preventDefault();
            e.stopPropagation();
            holdStartTime = Date.now();
            hotCorner.classList.add('holding');
            hotCornerProgress.classList.add('active');
            animateProgress();
            holdTimer = setTimeout(() => {
                cancelHold();
                openSettings();
            }, HOLD_DURATION);
        }

        function animateProgress() {
            if (!holdStartTime) return;
            const elapsed = Date.now() - holdStartTime;
            const pct = Math.min(100, (elapsed / HOLD_DURATION) * 100);
            hotCornerProgress.style.setProperty('--progress', pct + '%');
            if (pct < 100) {
                holdAnimFrame = requestAnimationFrame(animateProgress);
            }
        }

        function cancelHold() {
            if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
            if (holdAnimFrame) { cancelAnimationFrame(holdAnimFrame); holdAnimFrame = null; }
            holdStartTime = null;
            hotCorner.classList.remove('holding');
            hotCornerProgress.classList.remove('active');
            hotCornerProgress.style.setProperty('--progress', '0%');
        }

        // Touch: start hold, cancel only on touchend/touchcancel (NOT touchmove)
        hotCorner.addEventListener('touchstart', startHold, { passive: false });
        hotCorner.addEventListener('touchend', (e) => { e.preventDefault(); cancelHold(); });
        hotCorner.addEventListener('touchcancel', cancelHold);

        // Mouse fallback
        hotCorner.addEventListener('mousedown', startHold);
        hotCorner.addEventListener('mouseup', cancelHold);
        hotCorner.addEventListener('mouseleave', cancelHold);

        // Brightness control
        let autoBrightnessEnabled = localStorage.getItem('frame-auto-brightness') === 'true';
        let autoBrightnessInterval = null;

        function setBrightness(val) {
            const pct = parseInt(val);
            // Map 0-100 slider to 5-100% CSS brightness (0% = very dim, not black)
            const cssBrightness = 0.05 + (pct / 100) * 0.95;
            document.getElementById('slideshow').style.filter = `brightness(${cssBrightness})`;
            document.getElementById('brightness-value').textContent = pct + '%';
            document.getElementById('brightness-slider').value = pct;
            localStorage.setItem('frame-brightness', pct);
        }

        function toggleAutoBrightness() {
            autoBrightnessEnabled = !autoBrightnessEnabled;
            localStorage.setItem('frame-auto-brightness', autoBrightnessEnabled);
            updateAutoBrightnessUI();

            if (autoBrightnessEnabled) {
                fetchAutoBrightness();
                autoBrightnessInterval = setInterval(fetchAutoBrightness, 30000);
            } else {
                if (autoBrightnessInterval) { clearInterval(autoBrightnessInterval); autoBrightnessInterval = null; }
            }
        }

        function updateAutoBrightnessUI() {
            const btn = document.getElementById('auto-brightness-btn');
            const slider = document.getElementById('brightness-slider');
            if (autoBrightnessEnabled) {
                btn.classList.add('active');
                slider.disabled = true;
                slider.style.opacity = '0.4';
            } else {
                btn.classList.remove('active');
                slider.disabled = false;
                slider.style.opacity = '1';
            }
        }

        async function fetchAutoBrightness() {
            try {
                const resp = await fetch('/brightness');
                if (resp.ok) {
                    const data = await resp.json();
                    if (data.brightness != null) {
                        setBrightness(data.brightness);
                    }
                }
            } catch (e) {
                console.error('Auto brightness fetch failed:', e);
            }
        }

        // Restore saved brightness and auto state
        const savedBrightness = localStorage.getItem('frame-brightness');
        if (savedBrightness) {
            setBrightness(savedBrightness);
        }
        if (autoBrightnessEnabled) {
            updateAutoBrightnessUI();
            fetchAutoBrightness();
            autoBrightnessInterval = setInterval(fetchAutoBrightness, 30000);
        }

        // Settings overlay
        function showSettingsPage(page) {
            document.querySelectorAll('.settings-page').forEach(p => p.style.display = 'none');
            document.getElementById('settings-' + page).style.display = 'flex';
        }

        async function openSettings() {
            const overlay = document.getElementById('settings-overlay');
            showSettingsPage('main');
            overlay.classList.add('visible');
            // Pause slideshow
            if (intervalId) clearInterval(intervalId);

            applyLanguage();

            // Sync brightness slider and auto button
            const currentBrightness = localStorage.getItem('frame-brightness') || '100';
            document.getElementById('brightness-slider').value = currentBrightness;
            document.getElementById('brightness-value').textContent = currentBrightness + '%';
            updateAutoBrightnessUI();
            loadOrientation();
            loadInterval();
            loadSchedule();

            try {
                const resp = await fetch('/sysinfo');
                const info = await resp.json();
                document.getElementById('info-hostname').textContent = info.hostname || '--';
                document.getElementById('info-ip').textContent = (info.ips || []).join(', ') || '--';
                document.getElementById('info-tailscale').textContent = info.tailscale_ip || '--';
                document.getElementById('info-wifi').textContent = info.wifi_ssid || t('not_connected');
                document.getElementById('info-temp').textContent = info.cpu_temp != null ? info.cpu_temp + ' C' : '--';
                document.getElementById('info-disk').textContent = info.disk || '--';
                document.getElementById('info-photos').textContent = info.photo_count || '0';
            } catch (e) {
                console.error('Failed to load sysinfo:', e);
            }
            updateSyncStatus();
            syncPollId = setInterval(updateSyncStatus, 3000);
        }

        let syncPollId = null;

        async function updateSyncStatus() {
            try {
                const syncResp = await fetch('/sync/status');
                const sync = await syncResp.json();
                let syncText = sync.phase || 'idle';
                if (sync.running) {
                    syncText = sync.phase;
                    if (sync.pending != null) syncText += ` (${sync.pending} left)`;
                } else if (sync.error) {
                    syncText = 'error';
                } else if (sync.pending > 0) {
                    syncText = `idle (${sync.pending} queued)`;
                }
                document.getElementById('info-sync').textContent = syncText;
            } catch (e) {
                document.getElementById('info-sync').textContent = '--';
            }
        }

        let syncProgressPollId = null;

        function triggerSyncFromViewer() {
            if (!confirm(t('confirm_sync'))) return;
            fetch('/sync/trigger', { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                if (data.ok) {
                    startSyncProgressBar();
                }
            })
            .catch(() => {});
        }

        function startSyncProgressBar() {
            const bar = document.getElementById('sync-progress-bar');
            bar.style.width = '0%';
            bar.classList.remove('done');
            bar.classList.add('active');
            if (syncProgressPollId) clearInterval(syncProgressPollId);
            syncProgressPollId = setInterval(() => {
                fetch('/sync/status')
                .then(r => r.json())
                .then(s => {
                    if (s.running && s.total > 0) {
                        const done = s.total - (s.pending || 0);
                        const pct = Math.max(2, (done / s.total) * 100);
                        bar.style.width = pct + '%';
                    } else if (!s.running) {
                        clearInterval(syncProgressPollId);
                        syncProgressPollId = null;
                        bar.style.width = '100%';
                        bar.classList.add('done');
                        setTimeout(() => {
                            bar.classList.remove('active', 'done');
                            bar.style.width = '0%';
                        }, 3000);
                        // Reload photo list
                        init();
                    }
                })
                .catch(() => {
                    clearInterval(syncProgressPollId);
                    syncProgressPollId = null;
                    bar.classList.remove('active');
                    bar.style.width = '0%';
                });
            }, 3000);
        }

        function closeSettings() {
            document.getElementById('settings-overlay').classList.remove('visible');
            if (syncPollId) { clearInterval(syncPollId); syncPollId = null; }
            // Resume slideshow
            intervalId = setInterval(showNextPhoto, config.interval);
        }

        async function doShutdown() {
            if (confirm(t('confirm_shutdown'))) {
                await fetch('/shutdown', {method: 'POST'});
                document.getElementById('settings-system').innerHTML =
                    '<h1 style="color:#f66">' + t('shutting_down') + '</h1>';
            }
        }

        // Orientation control
        async function loadOrientation() {
            try {
                const resp = await fetch('/orientation');
                if (resp.ok) {
                    const data = await resp.json();
                    updateOrientationUI(data.orientation);
                }
            } catch (e) {
                console.error('Failed to load orientation:', e);
            }
        }

        function updateOrientationUI(orientation) {
            document.getElementById('orient-h').classList.toggle('active', orientation === 'horizontal');
            document.getElementById('orient-v').classList.toggle('active', orientation === 'vertical');
        }

        async function setOrientation(orientation) {
            updateOrientationUI(orientation);
            try {
                await fetch('/orientation', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ orientation }),
                });
                // Show saved feedback
                const msg = document.getElementById('orient-saved');
                msg.classList.add('show');
                setTimeout(() => msg.classList.remove('show'), 2000);
            } catch (e) {
                console.error('Failed to save orientation:', e);
            }
        }

        // Energy save schedule
        function setTimeDisplay(which, timeStr) {
            const parts = (timeStr || '00:00').split(':');
            let m = parseInt(parts[1]) || 0;
            m = Math.round(m / 5) * 5;
            if (m >= 60) m = 55;
            document.getElementById(which + '-h').textContent = parts[0];
            document.getElementById(which + '-m').textContent = String(m).padStart(2, '0');
        }

        function getTimeDisplay(which) {
            const h = document.getElementById(which + '-h').textContent;
            const m = document.getElementById(which + '-m').textContent;
            return h + ':' + m;
        }

        function loadInterval() {
            document.getElementById('interval-val').textContent = Math.round(config.interval / 1000);
        }

        function adjustInterval(delta) {
            let secs = Math.round(config.interval / 1000) + delta;
            if (secs < 10) secs = 10;
            if (secs > 3600) secs = 3600;
            config.interval = secs * 1000;
            document.getElementById('interval-val').textContent = secs;
            // Restart slideshow timer with new interval
            if (intervalId) clearInterval(intervalId);
            intervalId = setInterval(showNextPhoto, config.interval);
            // Save to server
            fetch('/api/interval', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ interval: secs })
            }).catch(() => {});
        }

        async function loadSchedule() {
            try {
                const resp = await fetch('/schedule');
                if (resp.ok) {
                    const data = await resp.json();
                    setTimeDisplay('off', data.off_time || '22:00');
                    setTimeDisplay('on', data.on_time || '07:00');
                    const btn = document.getElementById('schedule-btn');
                    if (data.enabled) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                }
            } catch (e) {
                console.error('Failed to load schedule:', e);
            }
        }

        function adjustTime(which, part, delta) {
            const hEl = document.getElementById(which + '-h');
            const mEl = document.getElementById(which + '-m');
            let h = parseInt(hEl.textContent);
            let m = parseInt(mEl.textContent);
            if (part === 'h') {
                h = (h + delta + 24) % 24;
            } else {
                m = (m + delta + 60) % 60;
            }
            hEl.textContent = String(h).padStart(2, '0');
            mEl.textContent = String(m).padStart(2, '0');
            saveSchedule();
        }

        function toggleSchedule() {
            const btn = document.getElementById('schedule-btn');
            btn.classList.toggle('active');
            saveSchedule();
        }

        async function saveSchedule() {
            const enabled = document.getElementById('schedule-btn').classList.contains('active');
            const off_time = getTimeDisplay('off');
            const on_time = getTimeDisplay('on');
            try {
                await fetch('/schedule', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ enabled, off_time, on_time }),
                });
            } catch (e) {
                console.error('Failed to save schedule:', e);
            }
        }

        async function doReboot() {
            if (confirm(t('confirm_reboot'))) {
                await fetch('/reboot', {method: 'POST'});
                document.getElementById('settings-system').innerHTML =
                    '<h1 style="color:#6af">' + t('rebooting') + '</h1>';
            }
        }

        // Load config and photos, then start
        async function init() {
            try {
                // Load slideshow config from server
                const cfgResp = await fetch('/config');
                if (cfgResp.ok) {
                    const serverConfig = await cfgResp.json();
                    config.interval = (serverConfig.interval || 300) * 1000;
                    config.fade_duration = serverConfig.fade_duration || 1.0;
                    // Apply fade duration to CSS
                    document.querySelectorAll('.photo, style').forEach(() => {});
                    const style = document.createElement('style');
                    style.textContent = `.photo { transition: opacity ${config.fade_duration}s ease-in-out; }`;
                    document.head.appendChild(style);
                }

                // Load photos list
                const response = await fetch('/list');
                if (!response.ok) {
                    throw new Error('Failed to load photos list');
                }
                photos = await response.json();

                if (photos.length === 0) {
                    // Check if we're in hotspot mode
                    try {
                        const wifiResp = await fetch('/api/wifi/status');
                        if (wifiResp.ok) {
                            const wifi = await wifiResp.json();
                            if (wifi.mode === 'hotspot') {
                                document.getElementById('loading').innerHTML =
                                    '<div style="text-align:center;line-height:1.8">' +
                                    '<div style="font-size:32px;margin-bottom:20px">' + t('wifi_setup_required') + '</div>' +
                                    '<div style="font-size:24px;color:#aaa">' + t('connect_to') + '</div>' +
                                    '<div style="font-size:28px;color:#6af;margin:8px 0">' + (wifi.hotspot_ssid || 'PhotoFrame-Setup') + '</div>' +
                                    '<div style="font-size:24px;color:#aaa">' + t('password') + '</div>' +
                                    '<div style="font-size:28px;color:#6af;margin:8px 0">' + (wifi.hotspot_password || 'photoframe') + '</div>' +
                                    '<div style="font-size:18px;color:#666;margin-top:20px">' + t('open_setup') + '</div>' +
                                    '</div>';
                                setTimeout(init, 15000);
                                return;
                            }
                        }
                    } catch (e) {}
                    // Normal mode: waiting for photos
                    document.getElementById('loading').textContent = t('waiting');
                    setTimeout(init, 10000);
                    return;
                }

                // Shuffle photos using Fisher-Yates algorithm
                for (let i = photos.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [photos[i], photos[j]] = [photos[j], photos[i]];
                }

                document.getElementById('loading').style.display = 'none';
                startSlideshow();
            } catch (error) {
                showError('Error loading photos: ' + error.message);
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('loading').style.display = 'none';
        }

        function preloadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = src;
            });
        }

        let transitioning = false;

        async function showPhoto(photoPath) {
            const slideshow = document.getElementById('slideshow');
            try {
                await preloadImage(photoPath);
                const newImage = document.createElement('img');
                newImage.src = photoPath;
                newImage.className = 'photo';
                slideshow.appendChild(newImage);
                await new Promise(resolve => setTimeout(resolve, 50));
                newImage.classList.add('active');
                if (currentImage) {
                    currentImage.classList.remove('active');
                    currentImage.classList.add('previous');
                }
                if (previousImage) previousImage.remove();
                previousImage = currentImage;
                currentImage = newImage;
                return true;
            } catch (error) {
                console.error('Error loading photo:', photoPath, error);
                return false;
            }
        }

        async function showNextPhoto() {
            if (photos.length === 0 || transitioning) return;
            transitioning = true;
            try {
                photoHistory.push(currentIndex);
                if (photoHistory.length > 50) photoHistory.shift();
                const photoPath = photos[currentIndex];
                if (await showPhoto(photoPath)) {
                    currentIndex = (currentIndex + 1) % photos.length;
                    if (currentIndex === 0) {
                        for (let i = photos.length - 1; i > 0; i--) {
                            const j = Math.floor(Math.random() * (i + 1));
                            [photos[i], photos[j]] = [photos[j], photos[i]];
                        }
                    }
                } else {
                    currentIndex = (currentIndex + 1) % photos.length;
                }
            } finally {
                transitioning = false;
            }
        }

        async function showPrevPhoto() {
            if (photoHistory.length === 0 || transitioning) return;
            transitioning = true;
            try {
                const prevIndex = photoHistory.pop();
                await showPhoto(photos[prevIndex]);
                currentIndex = prevIndex;
            } finally {
                transitioning = false;
            }
        }

        function startSlideshow() {
            // Show first photo immediately
            showNextPhoto();

            // Then show next photos at interval
            intervalId = setInterval(showNextPhoto, config.interval);
        }

        // Handle keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' || e.key === 'q' || e.key === 'Q') {
                hotCorner.click();
            } else if (e.key === ' ' || e.key === 'ArrowRight') {
                showNextPhoto();
            } else if (e.key === 'ArrowLeft') {
                showPrevPhoto();
            }
        });

        // Handle touch events for navigation
        let touchStartX = null;
        let touchStartY = null;
        let touchStartTime = 0;

        document.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                touchStartTime = Date.now();
            }
        });

        document.addEventListener('touchend', (e) => {
            if (touchStartX === null) return;
            const elapsed = Date.now() - touchStartTime;
            // Ignore if too slow (>1.5s) — probably not a swipe
            if (elapsed > 1500) { touchStartX = null; return; }

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const diffX = touchStartX - touchEndX;
            const diffY = Math.abs(touchStartY - touchEndY);

            // Only register horizontal swipes (X movement > Y movement)
            if (Math.abs(diffX) > 50 && Math.abs(diffX) > diffY) {
                if (diffX > 0) {
                    showNextPhoto();
                } else {
                    showPrevPhoto();
                }
            }
            touchStartX = null;
        });

        // Sleep mode: poll server, show black overlay when sleeping
        const sleepOverlay = document.getElementById('sleep-overlay');
        let isSleeping = false;

        // Tap black screen to wake display and open settings
        async function wakeAndOpenSettings() {
            await fetch('/wake', { method: 'POST' }).catch(() => {});
            isSleeping = false;
            sleepOverlay.classList.remove('active');
            openSettings();
        }
        sleepOverlay.addEventListener('touchstart', (e) => {
            e.preventDefault();
            wakeAndOpenSettings();
        });
        sleepOverlay.addEventListener('click', () => wakeAndOpenSettings());

        async function checkSleep() {
            try {
                const resp = await fetch('/schedule');
                if (resp.ok) {
                    const data = await resp.json();
                    if (data.sleeping && !isSleeping) {
                        // Enter sleep
                        isSleeping = true;
                        sleepOverlay.classList.add('active');
                        if (intervalId) clearInterval(intervalId);
                    } else if (!data.sleeping && isSleeping) {
                        // Wake up
                        isSleeping = false;
                        sleepOverlay.classList.remove('active');
                        intervalId = setInterval(showNextPhoto, config.interval);
                    }
                }
            } catch (e) {
                console.error('Sleep check failed:', e);
            }
        }

        setInterval(checkSleep, 30000);
        checkSleep();

        // Prevent screen sleep
        if ('wakeLock' in navigator) {
            let wakeLock = null;
            const requestWakeLock = async () => {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake lock activated');
                } catch (err) {
                    console.error('Wake lock error:', err);
                }
            };
            requestWakeLock();

            // Re-acquire wake lock when page becomes visible
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    requestWakeLock();
                }
            });
        }

        // QR code generation — server-side to avoid bundling a JS library
        function generateQR(text, canvas, cellSize) {
            cellSize = cellSize || 8;
            fetch('/api/qrcode?text=' + encodeURIComponent(text))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var modules = data.modules;
                    var count = modules.length;
                    var margin = 4;
                    var size = (count + margin * 2) * cellSize;
                    canvas.width = size;
                    canvas.height = size;
                    var ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, size, size);
                    ctx.fillStyle = '#000000';
                    for (var r = 0; r < count; r++) {
                        for (var c = 0; c < count; c++) {
                            if (modules[r][c]) {
                                ctx.fillRect((c + margin) * cellSize, (r + margin) * cellSize, cellSize, cellSize);
                            }
                        }
                    }
                })
                .catch(function(e) {
                    console.error('QR generation failed:', e);
                });
        }

        function openFolderSync() {
            // Get the local IP from the sysinfo already displayed
            var ipText = document.getElementById('info-ip').textContent || '';
            var ip = ipText.split(',')[0].trim();
            if (!ip || ip === '--') {
                // Fallback to Tailscale IP
                ip = (document.getElementById('info-tailscale').textContent || '').trim();
            }
            if (!ip || ip === '--') {
                ip = location.hostname;
            }
            var url = 'http://' + ip + ':' + location.port + '/remote';
            document.getElementById('qr-url').textContent = url;
            generateQR(url, document.getElementById('qr-canvas'), 8);
            document.getElementById('qr-overlay').classList.add('visible');
        }

        function closeFolderSync() {
            document.getElementById('qr-overlay').classList.remove('visible');
        }

        // Initialize
        document.getElementById('loading').textContent = t('loading');
        init();
    </script>
</body>
</html>
