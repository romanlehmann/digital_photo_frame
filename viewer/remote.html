<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photo Frame — Remote Config</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            color: #eee;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            padding-bottom: 100px;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 4px;
            color: #fff;
        }
        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .album-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .album-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .album-header span {
            font-size: 16px;
            font-weight: 600;
            color: #aaa;
        }
        .remove-btn {
            background: none;
            border: 1px solid #633;
            color: #f66;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 14px;
        }
        .remove-btn:active { background: #311; }
        label {
            display: block;
            color: #888;
            font-size: 13px;
            margin-bottom: 4px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            margin-bottom: 10px;
            -webkit-appearance: none;
        }
        input:focus {
            outline: none;
            border-color: #6af;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            color: #fff;
        }
        .btn:active { opacity: 0.8; }
        .btn-add {
            background: #222;
            border: 2px dashed #444;
            color: #888;
            padding: 14px;
            font-size: 16px;
            width: 100%;
            border-radius: 10px;
            margin-bottom: 16px;
        }
        .btn-add:active { background: #333; }
        .section-header {
            font-size: 16px;
            color: #888;
            margin-top: 24px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .album-name {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
        }
        .album-name-loading {
            color: #666;
            font-style: italic;
        }
        .btn-save { background: #2a6; }
        .btn-sync { background: #36a; }
        #status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 14px 20px;
            background: #1a1a1a;
            border-top: 1px solid #333;
            font-size: 14px;
            color: #aaa;
            text-align: center;
            display: none;
        }
        #status-bar.visible { display: block; }
        #status-bar.success { color: #6d6; }
        #status-bar.error { color: #f66; }
        #status-bar.syncing { color: #6af; }
        #sync-progress {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 0%;
            height: 5px;
            background: #6af;
            z-index: 2000;
            transition: width 0.5s ease, opacity 0.5s ease;
            opacity: 0;
        }
        #sync-progress.active { opacity: 1; }
        #sync-progress.done { background: #6d6; }
    </style>
</head>
<body>
    <h1 id="r-title">FolderSync</h1>
    <div class="subtitle" id="r-subtitle">Configure photo sources</div>

    <h2 class="section-header" id="r-syn-header">Synology Photos</h2>
    <div id="albums"></div>
    <button class="btn-add" id="r-add-syn" onclick="addAlbum()">+ Add Synology Album</button>

    <h2 class="section-header" id="r-gph-header">Google Photos</h2>
    <div id="gph-albums"></div>
    <button class="btn-add" id="r-add-gph" onclick="addGphAlbum()">+ Add Google Album</button>

    <h2 class="section-header" id="r-imm-header">Immich</h2>
    <div id="imm-albums"></div>
    <button class="btn-add" id="r-add-imm" onclick="addImmAlbum()">+ Add Immich Album</button>

    <div class="btn-row">
        <button class="btn btn-save" id="r-save" onclick="saveConfig()">Save</button>
        <button class="btn btn-sync" id="sync-btn" onclick="triggerSync()">Sync Now</button>
    </div>

    <div id="sync-progress"></div>
    <div id="status-bar"></div>

    <script>
        var i18n = {
            en: {
                title: 'FolderSync', subtitle: 'Configure photo sources',
                synology: 'Synology Photos', google: 'Google Photos', immich: 'Immich',
                add_syn: '+ Add Synology Album', add_gph: '+ Add Google Album', add_imm: '+ Add Immich Album',
                save: 'Save', sync_now: 'Sync Now',
                remove: 'Remove', share_url: 'Share URL', passphrase: 'Passphrase',
                resolving: 'resolving\u2026', new_album: 'new album',
                saving: 'Saving...', saved: 'Saved', error: 'Error: ',
                network_error: 'Network error', starting_sync: 'Starting sync...',
                sync_error: 'Sync error: ', sync_complete: 'Sync complete \u2014 ',
                photos: ' photos', left: ' left', lost_connection: 'Lost connection',
                empty_passphrase: '(leave empty if none)',
                confirm_sync: 'Start photo sync? The frame may become unresponsive until syncing is finished.',
            },
            de: {
                title: 'FolderSync', subtitle: 'Fotoquellen konfigurieren',
                synology: 'Synology Photos', google: 'Google Photos', immich: 'Immich',
                add_syn: '+ Synology Album', add_gph: '+ Google Album', add_imm: '+ Immich Album',
                save: 'Speichern', sync_now: 'Jetzt synchronisieren',
                remove: 'Entfernen', share_url: 'Freigabe-URL', passphrase: 'Passwort',
                resolving: 'l\u00f6se auf\u2026', new_album: 'neues Album',
                saving: 'Speichere...', saved: 'Gespeichert', error: 'Fehler: ',
                network_error: 'Netzwerkfehler', starting_sync: 'Starte Sync...',
                sync_error: 'Sync-Fehler: ', sync_complete: 'Sync abgeschlossen \u2014 ',
                photos: ' Fotos', left: ' \u00fcbrig', lost_connection: 'Verbindung verloren',
                empty_passphrase: '(leer lassen wenn keins)',
                confirm_sync: 'Foto-Sync starten? Der Rahmen reagiert m\u00f6glicherweise nicht, bis die Synchronisierung abgeschlossen ist.',
            }
        };
        var lang = localStorage.getItem('frame-language') || 'en';
        function t(k) { return (i18n[lang] || i18n.en)[k] || k; }

        function applyLang() {
            document.getElementById('r-title').textContent = t('title');
            document.getElementById('r-subtitle').textContent = t('subtitle');
            document.getElementById('r-syn-header').textContent = t('synology');
            document.getElementById('r-gph-header').textContent = t('google');
            document.getElementById('r-imm-header').textContent = t('immich');
            document.getElementById('r-add-syn').textContent = t('add_syn');
            document.getElementById('r-add-gph').textContent = t('add_gph');
            document.getElementById('r-add-imm').textContent = t('add_imm');
            document.getElementById('r-save').textContent = t('save');
            document.getElementById('sync-btn').textContent = t('sync_now');
        }
        applyLang();

        var albums = [];
        var gphAlbums = [];
        var immAlbums = [];
        var syncPollId = null;

        function sortByName(arr) {
            arr.sort(function(a, b) {
                var na = (a.name || a.url || '').toLowerCase();
                var nb = (b.name || b.url || '').toLowerCase();
                return na.localeCompare(nb);
            });
        }

        function albumLabel(album) {
            if (album.name) return '<span class="album-name">' + escapeAttr(album.name) + '</span>';
            if (album.url) return '<span class="album-name album-name-loading">' + t('resolving') + '</span>';
            return '<span class="album-name album-name-loading">' + t('new_album') + '</span>';
        }

        function render() {
            sortByName(albums);
            sortByName(gphAlbums);
            sortByName(immAlbums);

            var container = document.getElementById('albums');
            container.innerHTML = '';
            albums.forEach(function(album, i) {
                var card = document.createElement('div');
                card.className = 'album-card';
                card.innerHTML =
                    '<div class="album-header">' +
                        albumLabel(album) +
                        '<button class="remove-btn" onclick="removeAlbum(' + i + ')">' + t('remove') + '</button>' +
                    '</div>' +
                    '<label>' + t('share_url') + '</label>' +
                    '<input type="text" placeholder="https://photos.example.com/mo/sharing/..." ' +
                        'value="' + escapeAttr(album.url) + '" ' +
                        'oninput="albums[' + i + '].url=this.value">' +
                    '<label>' + t('passphrase') + '</label>' +
                    '<input type="password" placeholder="' + t('empty_passphrase') + '" ' +
                        'value="' + escapeAttr(album.pass) + '" ' +
                        'oninput="albums[' + i + '].pass=this.value">';
                container.appendChild(card);
            });

            var gphContainer = document.getElementById('gph-albums');
            gphContainer.innerHTML = '';
            gphAlbums.forEach(function(album, i) {
                var card = document.createElement('div');
                card.className = 'album-card';
                card.innerHTML =
                    '<div class="album-header">' +
                        albumLabel(album) +
                        '<button class="remove-btn" onclick="removeGphAlbum(' + i + ')">' + t('remove') + '</button>' +
                    '</div>' +
                    '<label>' + t('share_url') + '</label>' +
                    '<input type="text" placeholder="https://photos.app.goo.gl/..." ' +
                        'value="' + escapeAttr(album.url) + '" ' +
                        'oninput="gphAlbums[' + i + '].url=this.value">';
                gphContainer.appendChild(card);
            });

            var immContainer = document.getElementById('imm-albums');
            immContainer.innerHTML = '';
            immAlbums.forEach(function(album, i) {
                var card = document.createElement('div');
                card.className = 'album-card';
                card.innerHTML =
                    '<div class="album-header">' +
                        albumLabel(album) +
                        '<button class="remove-btn" onclick="removeImmAlbum(' + i + ')">' + t('remove') + '</button>' +
                    '</div>' +
                    '<label>' + t('share_url') + '</label>' +
                    '<input type="text" placeholder="https://immich.example.com/share/..." ' +
                        'value="' + escapeAttr(album.url) + '" ' +
                        'oninput="immAlbums[' + i + '].url=this.value">' +
                    '<label>' + t('passphrase') + '</label>' +
                    '<input type="password" placeholder="' + t('empty_passphrase') + '" ' +
                        'value="' + escapeAttr(album.pass) + '" ' +
                        'oninput="immAlbums[' + i + '].pass=this.value">';
                immContainer.appendChild(card);
            });
        }

        function escapeAttr(s) {
            return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
        }

        function addAlbum() {
            albums.push({ url: '', pass: '' });
            render();
        }

        function removeAlbum(i) {
            albums.splice(i, 1);
            render();
        }

        function addGphAlbum() {
            gphAlbums.push({ url: '' });
            render();
        }

        function removeGphAlbum(i) {
            gphAlbums.splice(i, 1);
            render();
        }

        function addImmAlbum() {
            immAlbums.push({ url: '', pass: '' });
            render();
        }

        function removeImmAlbum(i) {
            immAlbums.splice(i, 1);
            render();
        }

        function showStatus(msg, cls) {
            var bar = document.getElementById('status-bar');
            bar.textContent = msg;
            bar.className = 'visible' + (cls ? ' ' + cls : '');
        }

        function hideStatus() {
            document.getElementById('status-bar').className = '';
        }

        function saveConfig() {
            var synUrls = albums.map(function(a) { return a.url; });
            var synPasses = albums.map(function(a) { return a.pass; });
            var gphUrls = gphAlbums.map(function(a) { return a.url; });
            var immUrls = immAlbums.map(function(a) { return a.url; });
            var immPasses = immAlbums.map(function(a) { return a.pass; });
            showStatus(t('saving'), '');

            // Save Synology, Google Photos, and Immich configs
            Promise.all([
                fetch('/api/synology', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ share_urls: synUrls, share_passphrases: synPasses })
                }).then(function(r) { return r.json(); }),
                fetch('/api/google_photos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ share_urls: gphUrls })
                }).then(function(r) { return r.json(); }),
                fetch('/api/immich', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ share_urls: immUrls, share_passphrases: immPasses })
                }).then(function(r) { return r.json(); })
            ])
            .then(function(results) {
                var allOk = results.every(function(d) { return d.ok; });
                if (allOk) {
                    showStatus(t('saved'), 'success');
                    setTimeout(hideStatus, 2000);
                } else {
                    var errs = results.filter(function(d) { return !d.ok; })
                        .map(function(d) { return d.error || 'unknown'; });
                    showStatus(t('error') + errs.join(', '), 'error');
                }
            })
            .catch(function(e) {
                showStatus(t('network_error'), 'error');
            });
        }

        function triggerSync() {
            if (!confirm(t('confirm_sync'))) return;
            showStatus(t('starting_sync'), 'syncing');
            var bar = document.getElementById('sync-progress');
            bar.style.width = '0%';
            bar.classList.remove('done');
            bar.classList.add('active');
            fetch('/sync/trigger', { method: 'POST' })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.ok) {
                    pollSyncStatus();
                } else {
                    showStatus(data.message || t('network_error'), 'error');
                    bar.classList.remove('active');
                }
            })
            .catch(function(e) {
                showStatus(t('network_error'), 'error');
                bar.classList.remove('active');
            });
        }

        function pollSyncStatus() {
            var bar = document.getElementById('sync-progress');
            if (syncPollId) clearInterval(syncPollId);
            syncPollId = setInterval(function() {
                fetch('/sync/status')
                .then(function(r) { return r.json(); })
                .then(function(s) {
                    if (s.running) {
                        var msg = s.phase || 'syncing';
                        if (s.pending != null) msg += ' (' + s.pending + t('left') + ')';
                        showStatus(msg, 'syncing');
                        if (s.total > 0) {
                            var done = s.total - (s.pending || 0);
                            var pct = Math.max(2, (done / s.total) * 100);
                            bar.style.width = pct + '%';
                        }
                    } else {
                        clearInterval(syncPollId);
                        syncPollId = null;
                        bar.style.width = '100%';
                        bar.classList.add('done');
                        setTimeout(function() {
                            bar.classList.remove('active', 'done');
                            bar.style.width = '0%';
                        }, 3000);
                        if (s.error) {
                            showStatus(t('sync_error') + s.error, 'error');
                        } else {
                            var count = (s.h_photos || 0) + (s.v_photos || 0);
                            showStatus(t('sync_complete') + count + t('photos'), 'success');
                            setTimeout(hideStatus, 4000);
                        }
                    }
                })
                .catch(function() {
                    clearInterval(syncPollId);
                    syncPollId = null;
                    bar.classList.remove('active');
                    bar.style.width = '0%';
                    showStatus(t('lost_connection'), 'error');
                });
            }, 3000);
        }

        function fetchAlbumNames() {
            fetch('/api/album_names')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var synNames = data.synology || {};
                var gphNames = data.google || {};
                var immNames = data.immich || {};
                albums.forEach(function(a) {
                    if (synNames[a.url]) a.name = synNames[a.url];
                });
                gphAlbums.forEach(function(a) {
                    if (gphNames[a.url]) a.name = gphNames[a.url];
                });
                immAlbums.forEach(function(a) {
                    if (immNames[a.url]) a.name = immNames[a.url];
                });
                render();
            })
            .catch(function() {});
        }

        // Load current config on page load
        Promise.all([
            fetch('/api/synology').then(function(r) { return r.json(); }),
            fetch('/api/google_photos').then(function(r) { return r.json(); }),
            fetch('/api/immich').then(function(r) { return r.json(); })
        ])
        .then(function(results) {
            var synData = results[0];
            var gphData = results[1];
            var immData = results[2];

            var urls = synData.share_urls || [];
            var passes = synData.share_passphrases || [];
            for (var i = 0; i < urls.length; i++) {
                albums.push({ url: urls[i], pass: passes[i] || '' });
            }

            var gphUrls = gphData.share_urls || [];
            for (var j = 0; j < gphUrls.length; j++) {
                gphAlbums.push({ url: gphUrls[j] });
            }

            var immUrls = immData.share_urls || [];
            var immPasses = immData.share_passphrases || [];
            for (var k = 0; k < immUrls.length; k++) {
                immAlbums.push({ url: immUrls[k], pass: immPasses[k] || '' });
            }

            render();
            // Resolve album names (may be slow for Synology auth)
            fetchAlbumNames();
        })
        .catch(function() {
            render();
        });
    </script>
</body>
</html>
